<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>Про нас — Elegant's Store</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body data-page="settings">

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header class="hdr">
    <div class="hdr-logo">Elegant's<sup>Store</sup></div>
    <div class="hdr-actions">
      <a href="cart.html" class="cart-chip">
        🛒 <span class="cnt">0</span>
      </a>
    </div>
  </header>

  <!-- ══ MAIN ════════════════════════════════════════════════ -->
  <main class="wrap page">

    <div class="sec-hdr au">
      <h2>ℹ️ Про магазин</h2>
    </div>

    <!-- Access badge -->
    <div class="au1 mb12">
      <span id="settingsBadge" class="overline t3">Завантаження…</span>
    </div>

    <!-- Settings sections (filled by JS) -->
    <div id="settingsWrap" class="au1"></div>

    <!-- Write to manager -->
    <div class="scard au2">
      <div class="scard-hdr"><span>💬</span><h3>Зв'яжіться з нами</h3></div>
      <div class="sfield">
        <label>Менеджер</label>
        <button class="btn btn-gold btn-full mt8" onclick="ES.openChatWithManager()">
          💬 Написати менеджеру
        </button>
      </div>
    </div>

    <!-- Admin panel link (visible only for admins, shown by JS) -->
    <div id="adminLink" style="display:none;margin-top:12px" class="au2">
      <a href="admin.html" class="btn btn-outline btn-full">⚙️ Адмін-панель</a>
    </div>

  </main>

  <!-- ══ BOTTOM NAV ══════════════════════════════════════════ -->
  <nav class="nav">
    <a href="index.html"    class="nav-item" data-p="index">
      <span class="ni">🏠</span><span>Головна</span>
    </a>
    <a href="cart.html"     class="nav-item" data-p="cart">
      <span class="ni">🛒</span><span>Кошик</span>
    </a>
    <a href="settings.html" class="nav-item" data-p="settings">
      <span class="ni">ℹ️</span><span>Про нас</span>
    </a>
  </nav>

  <script src="elegant-telegram.js"></script>
  <script src="app.js"></script>
</body>
</html>
